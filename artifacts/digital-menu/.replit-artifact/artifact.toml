kind = "web"
previewPath = "/"
title = "Digital Menu"
version = "1.0.0"
id = "artifacts/digital-menu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25443

[services.development]
run = "pnpm --filter @workspace/digital-menu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-menu", "run", "build" ]
publicDir = "artifacts/digital-menu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25443"
BASE_PATH = "/"
